<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Διαδραστικός Χάρτης Αιολικών Πάρκων (ενδεικτικά)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; padding:0; font-family: Arial, sans-serif; background:#fff; }
    #map { height: 100vh; width: 100%; }
    .custom-pin{
      background-color:#FF7E79;
      border-radius:50%;
      width:10px; height:10px;
      border:2px solid #fff;
      box-shadow:0 0 3px rgba(0,0,0,0.3);
    }
    .popup h3{ margin:0 0 6px 0; font-family: Arial; font-weight: 800; color:#FF7E79; font-size: 13px; }
    .popup p{ margin:4px 0; font-size: 12px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Initialize the map
    var map = L.map('map').setView([20, 0], 2);

    // Add OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">Συντελεστές OpenStreetMap</a>'
    }).addTo(map);

    // Wind park data (ενδεικτικά παραδείγματα — όχι πλήρης λίστα)
    var windParks = [
      { name:"Gansu (Jiuquan) Wind Farm — Κίνα", lat:40.6, lng:96.6, capacity:"(στόχος) >20 GW", type:"Χερσαίο", note:"Από τα μεγαλύτερα σε κλίμακα έργα." },
      { name:"Alta Wind Energy Center — ΗΠΑ (Καλιφόρνια)", lat:34.9, lng:-118.2, capacity:">1.5 GW", type:"Χερσαίο", note:"Tehachapi / Mojave area." },
      { name:"Hornsea Project — Ην. Βασίλειο", lat:53.9, lng:0.4, capacity:"~1.2 GW", type:"Υπεράκτιο", note:"Βόρεια Θάλασσα." },
      { name:"Υπεράκτιο πάρκο Βελγίου — Βόρεια Θάλασσα", lat:51.6, lng:2.9, capacity:"(αναφορά) 399 ανεμογεννήτριες", type:"Υπεράκτιο", note:"Ενδεικτικό παράδειγμα από το κείμενο." },

      { name:"Dogger Bank — Ην. Βασίλειο", lat:54.8, lng:2.2, capacity:"πολλά GW (φάσεις)", type:"Υπεράκτιο", note:"Μεγάλο σύγχρονο υπεράκτιο έργο." },
      { name:"Walney Extension — Ην. Βασίλειο", lat:54.0, lng:-3.6, capacity:"~659 MW", type:"Υπεράκτιο", note:"Irish Sea area." },
      { name:"London Array — Ην. Βασίλειο", lat:51.6, lng:1.4, capacity:"~630 MW", type:"Υπεράκτιο", note:"Thames Estuary." },

      { name:"Jaisalmer Wind Park — Ινδία", lat:26.9, lng:70.9, capacity:"~1.6 GW", type:"Χερσαίο", note:"Rajasthan." },
      { name:"Shepherds Flat — ΗΠΑ (Όρεγκον)", lat:45.7, lng:-120.0, capacity:"~845 MW", type:"Χερσαίο", note:"Pacific Northwest." },
      { name:"Roscoe Wind Farm — ΗΠΑ (Τέξας)", lat:32.4, lng:-100.4, capacity:"~781 MW", type:"Χερσαίο", note:"West Texas." }
    ];

    // Custom icon
    var customIcon = L.divIcon({
      className: 'custom-pin',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    windParks.forEach(function(park){
      var marker = L.marker([park.lat, park.lng], { icon: customIcon }).addTo(map);
      marker.bindPopup(`
        <div class="popup">
          <h3>${park.name}</h3>
          <p><b>Τύπος:</b> ${park.type}</p>
          <p><b>Ισχύς/Μέγεθος:</b> ${park.capacity}</p>
          <p style="color: rgba(0,0,0,.65);"><b>Σημείωση:</b> ${park.note}</p>
        </div>
      `);
    });
  </script>
</body>
</html>
